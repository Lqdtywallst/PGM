<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1600" height="900" fill="#07080C"/>

  <rect x="36" y="20" width="1528" height="860" rx="24" fill="#090B10" stroke="#20242C" stroke-width="2"/>
  <text x="64" y="66" fill="#F5F1E8" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">Viewport</text>

  <rect x="132" y="28" width="220" height="56" rx="14" fill="#10131A" stroke="#6E5B31" stroke-dasharray="8 8"/>
  <text x="160" y="63" fill="#F1E2BD" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">Header zone</text>

  <line x1="112" y1="112" x2="112" y2="842" stroke="#434855" stroke-width="2" stroke-dasharray="8 8"/>
  <line x1="1488" y1="112" x2="1488" y2="842" stroke="#434855" stroke-width="2" stroke-dasharray="8 8"/>
  <text x="74" y="106" fill="#9EA6B5" font-family="Inter, Arial, sans-serif" font-size="18">safe margin</text>
  <text x="1418" y="106" fill="#9EA6B5" font-family="Inter, Arial, sans-serif" font-size="18">safe margin</text>

  <rect x="170" y="116" width="1260" height="694" rx="30" fill="#0B0E14" stroke="#3B404B" stroke-width="2"/>
  <text x="202" y="156" fill="#F5F1E8" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">Hero frame / marco visual centrado</text>
  <text x="202" y="188" fill="#C9CFD9" font-family="Inter, Arial, sans-serif" font-size="20">Este bloque es el que deberia respetar los margenes exteriores y el aire inferior.</text>

  <rect x="222" y="210" width="760" height="520" rx="24" fill="#11161D" stroke="#D6BC86" stroke-width="2.5"/>
  <text x="254" y="250" fill="#F1E2BD" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">Content box / caja principal</text>
  <text x="254" y="282" fill="#D8D0BE" font-family="Inter, Arial, sans-serif" font-size="20">Todo el contenido nace aqui. No hay dos columnas de texto.</text>

  <rect x="254" y="314" width="430" height="34" rx="10" fill="#171C24" stroke="#C49A52"/>
  <text x="276" y="337" fill="#F1E2BD" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="600">Eyebrow</text>

  <rect x="254" y="374" width="644" height="172" rx="16" fill="#141A22" stroke="#86B7FF" stroke-width="2"/>
  <text x="280" y="414" fill="#D8EAFF" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">H1 / bloque de impacto</text>
  <text x="280" y="448" fill="#D8EAFF" font-family="Inter, Arial, sans-serif" font-size="20">La masa grande vive aqui.</text>
  <text x="280" y="478" fill="#D8EAFF" font-family="Inter, Arial, sans-serif" font-size="20">Se puede abrir mas o mover un poco a la izquierda,</text>
  <text x="280" y="508" fill="#D8EAFF" font-family="Inter, Arial, sans-serif" font-size="20">pero sin salirse del hero frame.</text>

  <rect x="254" y="570" width="520" height="88" rx="16" fill="#141A22" stroke="#79D6C9" stroke-width="2"/>
  <text x="280" y="606" fill="#CBFFF6" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="700">Lead / parrafo</text>
  <text x="280" y="636" fill="#CBFFF6" font-family="Inter, Arial, sans-serif" font-size="20">Mas estrecho que el H1, pero arrancando del mismo borde.</text>

  <rect x="254" y="686" width="454" height="132" rx="18" fill="#141A22" stroke="#E3F655" stroke-width="2"/>
  <text x="280" y="724" fill="#F4FFB2" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="700">Launcher / CTA block</text>
  <text x="280" y="756" fill="#F4FFB2" font-family="Inter, Arial, sans-serif" font-size="20">Mas compacto y con margen inferior visible.</text>
  <text x="280" y="786" fill="#F4FFB2" font-family="Inter, Arial, sans-serif" font-size="20">No debe pegarse al borde de abajo.</text>

  <rect x="1028" y="250" width="320" height="418" rx="22" fill="#0D1016" stroke="#2A2F39" stroke-dasharray="10 10"/>
  <text x="1062" y="294" fill="#BDC4CC" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">Right breathing area</text>
  <text x="1062" y="334" fill="#BDC4CC" font-family="Inter, Arial, sans-serif" font-size="20">No es una columna.</text>
  <text x="1062" y="364" fill="#BDC4CC" font-family="Inter, Arial, sans-serif" font-size="20">Es aire visual, fondo y equilibrio.</text>
  <text x="1062" y="414" fill="#BDC4CC" font-family="Inter, Arial, sans-serif" font-size="20">La marca fantasma puede vivir aqui,</text>
  <text x="1062" y="444" fill="#BDC4CC" font-family="Inter, Arial, sans-serif" font-size="20">pero no debe mandar la composicion.</text>

  <line x1="222" y1="748" x2="1430" y2="748" stroke="#5B606B" stroke-width="2" stroke-dasharray="8 8"/>
  <text x="224" y="774" fill="#A7AFBC" font-family="Inter, Arial, sans-serif" font-size="18">baseline visual del launcher: aqui tiene que seguir habiendo aire por debajo</text>

  <rect x="222" y="820" width="1208" height="36" rx="10" fill="#12161E" stroke="#303540"/>
  <text x="246" y="844" fill="#F5F1E8" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">Lectura correcta:</text>
  <text x="438" y="844" fill="#C9CFD9" font-family="Inter, Arial, sans-serif" font-size="20">hero frame centrado -> content box a la izquierda -> derecha libre para respiracion</text>
</svg>
