<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reserve - Prestige Goal Motion</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: #000;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        .reserve-container {
            width: 100%;
            max-width: 800px;
            background: #18181b;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(212, 175, 55, 0.2);
            border: 1px solid rgba(212, 175, 55, 0.2);
        }

        .steps-indicator {
            display: flex;
            justify-content: space-between;
            margin-bottom: 2rem;
            font-size: 0.9rem;
            color: #71717a;
        }

        .steps-indicator span {
            transition: color 0.3s;
        }

        .steps-indicator span.active {
            color: #d4af37;
            font-weight: 600;
        }

        .step-content {
            display: none;
        }

        .step-content.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 8px;
            background: #111;
            border: 1px solid #333;
            color: white;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .input:focus {
            outline: none;
            border-color: #d4af37;
            box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.1);
        }

        .input::placeholder {
            color: #71717a;
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #d4af37, rgba(212, 175, 55, 0.8));
            color: #000;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 1rem;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.3);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            padding: 12px 24px;
            background: transparent;
            border: 1px solid #444;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-secondary:hover {
            border-color: #d4af37;
            color: #d4af37;
        }

        .step-navigation {
            display: flex;
            justify-content: space-between;
            gap: 1rem;
            margin-top: 2rem;
        }

        .step-navigation .btn {
            margin-top: 0;
        }

        .step-navigation .btn-secondary {
            flex: 1;
        }

        .step-navigation .btn {
            flex: 2;
        }

        .summary-section {
            text-align: center;
            padding: 2rem;
            background: rgba(212, 175, 55, 0.05);
            border-radius: 8px;
            border: 1px solid rgba(212, 175, 55, 0.2);
            margin-bottom: 2rem;
        }

        .summary-section h3 {
            color: #d4af37;
            font-size: 1.5rem;
            margin-bottom: 1rem;
        }

        .summary-section .total {
            font-size: 2rem;
            font-weight: bold;
            color: #d4af37;
            margin-top: 1rem;
        }

        .error-message {
            color: #ef4444;
            margin-top: 0.5rem;
            font-size: 0.9rem;
        }

        .success-message {
            color: #10b981;
            margin-top: 0.5rem;
            font-size: 0.9rem;
        }

        /* Calendar Styles */
        .calendar-container {
            margin-bottom: 2rem;
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .calendar-nav {
            background: transparent;
            border: 1px solid #444;
            color: white;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1rem;
        }

        .calendar-nav:hover {
            border-color: #d4af37;
            color: #d4af37;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
            background: #111;
            padding: 1rem;
            border-radius: 8px;
            border: 1px solid #333;
        }

        .calendar-day {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.9rem;
            color: #a1a1aa;
        }

        .calendar-day.header {
            color: #d4af37;
            font-weight: 600;
            cursor: default;
            font-size: 0.85rem;
        }

        .calendar-day.past {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .calendar-day.available {
            color: white;
        }

        .calendar-day.available:hover {
            background: rgba(212, 175, 55, 0.2);
            color: #d4af37;
        }

        .calendar-day.today {
            background: rgba(212, 175, 55, 0.1);
            border: 1px solid #d4af37;
            color: #d4af37;
            font-weight: 600;
        }

        .calendar-day.selected {
            background: #d4af37;
            color: #000;
            font-weight: 600;
        }

        .calendar-day.start-date {
            background: linear-gradient(135deg, #d4af37, rgba(212, 175, 55, 0.8));
            color: #000;
        }

        .calendar-day.end-date {
            background: linear-gradient(135deg, #d4af37, rgba(212, 175, 55, 0.8));
            color: #000;
        }

        .calendar-day.in-range {
            background: rgba(212, 175, 55, 0.2);
            color: #d4af37;
        }

        .calendar-day.unavailable {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .reservation-summary {
            font-size: 0.95rem;
        }

        .btn-home {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: #d4af37;
            text-decoration: none;
            font-size: 0.9rem;
            transition: all 0.3s;
            padding: 8px 16px;
            border-radius: 6px;
            border: 1px solid rgba(212, 175, 55, 0.3);
        }

        .btn-home:hover {
            background: rgba(212, 175, 55, 0.1);
            border-color: #d4af37;
            transform: translateX(-3px);
        }

        .btn-home i {
            font-size: 0.85rem;
        }

        @media (max-width: 768px) {
            .reserve-container {
                padding: 1.5rem;
            }

            .steps-indicator {
                font-size: 0.8rem;
            }

            .step-navigation {
                flex-direction: column;
            }

            .step-navigation .btn,
            .step-navigation .btn-secondary {
                width: 100%;
            }

            .calendar-grid {
                gap: 2px;
                padding: 0.5rem;
            }

            .calendar-day {
                font-size: 0.75rem;
            }
        }
    </style>
</head>
<body>
    <div class="reserve-container">
        <!-- STEPS INDICATOR -->
        <div class="steps-indicator">
            <span id="step1-indicator" class="active">1. Info</span>
            <span id="step2-indicator">2. Dates</span>
            <span id="step3-indicator">3. Payment</span>
        </div>

        <!-- STEP 1: Customer Information -->
        <div id="step1" class="step-content active">
            <div style="margin-bottom: 1.5rem;">
                <a href="/index.html" class="btn-home">
                    <i class="fas fa-arrow-left"></i>
                    <span>Back to Home</span>
                </a>
            </div>
            <h2 style="color: #d4af37; margin-bottom: 1.5rem;">Your Information</h2>
            <div class="form-group">
                <input type="text" id="fullName" name="fullName" placeholder="Full Name *" class="input" required>
            </div>
            <div class="form-group">
                <input type="text" id="passport" name="passport" placeholder="ID / Passport *" class="input" required>
            </div>
            <div class="form-group">
                <input type="email" id="email" name="email" placeholder="Email *" class="input" required>
            </div>
            <div class="form-group">
                <input type="tel" id="phone" name="phone" placeholder="Phone / WhatsApp *" class="input" required>
            </div>
            <div class="form-group">
                <input type="text" id="address" name="address" placeholder="Full Address *" class="input" required>
            </div>
            <div class="form-group">
                <input type="text" id="city" name="city" placeholder="City *" class="input" required>
            </div>
            <div class="form-group">
                <input type="text" id="postalCode" name="postalCode" placeholder="Postal Code *" class="input" required>
            </div>
            <div class="form-group">
                <select id="country" name="country" class="input" required>
                    <option value="Spain">Spain</option>
                    <option value="France">France</option>
                    <option value="Italy">Italy</option>
                    <option value="Germany">Germany</option>
                    <option value="United Kingdom">United Kingdom</option>
                    <option value="United States">United States</option>
                    <option value="United Arab Emirates">United Arab Emirates</option>
                    <option value="Other">Other</option>
                </select>
            </div>
            <button onclick="nextStep()" class="btn">Continue to Dates →</button>
        </div>

        <!-- STEP 2: Dates -->
        <div id="step2" class="step-content">
            <div style="margin-bottom: 1.5rem;">
                <a href="/index.html" class="btn-home">
                    <i class="fas fa-arrow-left"></i>
                    <span>Back to Home</span>
                </a>
            </div>
            <h2 style="color: #d4af37; margin-bottom: 1.5rem;">Select Your Dates</h2>
            
            <!-- Calendar Container -->
            <div class="calendar-container">
                <div class="calendar-header">
                    <button class="calendar-nav" onclick="changeMonth(-1)">‹ Previous</button>
                    <h3 id="currentMonth" style="margin: 0; color: #d4af37;"></h3>
                    <button class="calendar-nav" onclick="changeMonth(1)">Next ›</button>
                </div>
                <div id="calendarGrid" class="calendar-grid"></div>
            </div>

            <!-- Date Inputs (hidden but used for form submission) -->
            <div class="form-group" style="margin-top: 1.5rem;">
                <label style="display: block; margin-bottom: 0.5rem; color: #d4af37;">Start Date *</label>
                <input type="date" id="startDate" name="startDate" class="input" required onchange="updateCalendarFromInputs()">
            </div>
            <div class="form-group">
                <label style="display: block; margin-bottom: 0.5rem; color: #d4af37;">End Date *</label>
                <input type="date" id="endDate" name="endDate" class="input" required onchange="updateCalendarFromInputs()">
            </div>

            <!-- Reservation Summary -->
            <div class="reservation-summary" style="margin-top: 1.5rem; padding: 1rem; background: rgba(212, 175, 55, 0.05); border-radius: 8px; border: 1px solid rgba(212, 175, 55, 0.2);">
                <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem;">
                    <span>Days:</span>
                    <span id="summaryDays" style="color: #d4af37; font-weight: 600;">0</span>
                </div>
                <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem;">
                    <span>Price per day:</span>
                    <span id="summaryPricePerDay" style="color: #d4af37;">€0</span>
                </div>
                <div style="display: flex; justify-content: space-between; padding-top: 0.5rem; border-top: 1px solid rgba(212, 175, 55, 0.2); font-size: 1.2rem; font-weight: 600;">
                    <span>Total:</span>
                    <span id="summaryTotal" style="color: #d4af37;">€0.00</span>
                </div>
            </div>

            <div class="form-group" style="margin-top: 1.5rem;">
                <input type="text" id="pickupLocation" name="pickupLocation" placeholder="Pickup Location *" class="input" required>
            </div>
            <div class="step-navigation">
                <button onclick="prevStep()" class="btn-secondary">← Back</button>
                <button onclick="nextStep()" class="btn" id="continueToPaymentBtn" disabled style="opacity: 0.5; cursor: not-allowed;">Continue to Payment →</button>
            </div>
        </div>

        <!-- STEP 3: Payment -->
        <div id="step3" class="step-content">
            <div style="margin-bottom: 1.5rem;">
                <a href="/index.html" class="btn-home">
                    <i class="fas fa-arrow-left"></i>
                    <span>Back to Home</span>
                </a>
            </div>
            <h2 style="color: #d4af37; margin-bottom: 1.5rem; text-align: center;">Payment</h2>
            <div class="summary-section">
                <h3 id="selectedCar">Mercedes GLE 53 AMG</h3>
                <p style="margin-top: 1rem; color: #a1a1aa;">Total Amount</p>
                <p class="total" id="totalAmount">€0.00</p>
            </div>
            <div id="paymentStatus"></div>
            <button onclick="submitReservation()" class="btn" id="submitBtn">
                Confirm & Pay
            </button>
            <div class="step-navigation" style="margin-top: 1rem;">
                <button onclick="prevStep()" class="btn-secondary">← Back</button>
            </div>
        </div>
    </div>

    <script>
        // Estado del formulario
        let currentStep = 1;
        let selectedCar = 'Mercedes GLE 53 AMG';
        let pricePerDay = 500;
        
        // Estado del calendario
        let currentDate = new Date();
        let selectedStartDate = null;
        let selectedEndDate = null;

        // Obtener parámetros de la URL (si vienen del index.html)
        const urlParams = new URLSearchParams(window.location.search);
        const carName = urlParams.get('car');
        const price = urlParams.get('price');
        
        if (carName) selectedCar = decodeURIComponent(carName);
        if (price) pricePerDay = parseFloat(price);

        // Actualizar información del vehículo
        document.getElementById('selectedCar').textContent = selectedCar;
        document.getElementById('summaryPricePerDay').textContent = `€${pricePerDay}`;
        
        // Inicializar calendario cuando se carga la página
        if (document.getElementById('step2').classList.contains('active')) {
            generateCalendar();
        }

        // Navegación entre pasos
        function nextStep() {
            if (currentStep === 1) {
                // Validar paso 1
                const required = ['fullName', 'passport', 'email', 'phone', 'address', 'city', 'postalCode', 'country'];
                let isValid = true;
                
                required.forEach(field => {
                    const input = document.getElementById(field);
                    if (!input.value.trim()) {
                        isValid = false;
                        input.style.borderColor = '#ef4444';
                    } else {
                        input.style.borderColor = '#333';
                    }
                });

                if (!isValid) {
                    showMessage('Please complete all required fields', 'error');
                    return;
                }
            } else if (currentStep === 2) {
                // Validar paso 2
                const startDate = document.getElementById('startDate').value;
                const endDate = document.getElementById('endDate').value;
                const pickupLocation = document.getElementById('pickupLocation').value;

                if (!startDate || !endDate || !pickupLocation) {
                    showMessage('Please complete all required fields', 'error');
                    return;
                }

                if (new Date(endDate) <= new Date(startDate)) {
                    showMessage('End date must be after start date', 'error');
                    return;
                }

                // Calcular total
                calculateTotal();
            }
            
            // Inicializar calendario cuando se entra al paso 2
            if (currentStep === 2) {
                generateCalendar();
            }

            if (currentStep < 3) {
                currentStep++;
                updateStepDisplay();
            }
        }

        function prevStep() {
            if (currentStep > 1) {
                currentStep--;
                updateStepDisplay();
            }
        }

        function updateStepDisplay() {
            // Ocultar todos los pasos
            document.querySelectorAll('.step-content').forEach(step => {
                step.classList.remove('active');
            });

            // Mostrar paso actual
            document.getElementById(`step${currentStep}`).classList.add('active');

            // Actualizar indicadores
            document.querySelectorAll('.steps-indicator span').forEach((indicator, index) => {
                if (index + 1 === currentStep) {
                    indicator.classList.add('active');
                } else {
                    indicator.classList.remove('active');
                }
            });
            
            // Inicializar calendario cuando se muestra el paso 2
            if (currentStep === 2) {
                generateCalendar();
            }
        }
        
        // Funciones del calendario
        function generateCalendar() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            const firstDay = new Date(year, month, 1);
            const lastDay = new Date(year, month + 1, 0);
            const daysInMonth = lastDay.getDate();
            const startingDayOfWeek = firstDay.getDay();

            const monthNames = ['January', 'February', 'March', 'April', 'May', 'June',
                              'July', 'August', 'September', 'October', 'November', 'December'];
            document.getElementById('currentMonth').textContent = `${monthNames[month]} ${year}`;

            const grid = document.getElementById('calendarGrid');
            grid.innerHTML = '';

            // Días de la semana
            const weekDays = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
            weekDays.forEach(day => {
                const dayElement = document.createElement('div');
                dayElement.className = 'calendar-day header';
                dayElement.textContent = day;
                grid.appendChild(dayElement);
            });

            // Espacios vacíos al inicio
            for (let i = 0; i < startingDayOfWeek; i++) {
                const emptyDay = document.createElement('div');
                emptyDay.className = 'calendar-day';
                grid.appendChild(emptyDay);
            }

            // Días del mes
            const today = new Date();
            today.setHours(0, 0, 0, 0);

            for (let day = 1; day <= daysInMonth; day++) {
                const date = new Date(year, month, day);
                const dateStr = formatDate(date);
                const dayElement = document.createElement('div');
                dayElement.className = 'calendar-day';
                dayElement.textContent = day;

                // Verificar si es una fecha pasada
                if (date < today) {
                    dayElement.classList.add('past', 'unavailable');
                } else {
                    dayElement.classList.add('available');
                    dayElement.onclick = () => selectDate(date);
                }

                // Marcar hoy
                if (dateStr === formatDate(today)) {
                    dayElement.classList.add('today');
                }

                // Marcar fechas seleccionadas y rango
                if (selectedStartDate && selectedEndDate) {
                    const startStr = formatDate(selectedStartDate);
                    const endStr = formatDate(selectedEndDate);
                    
                    if (dateStr === startStr) {
                        dayElement.classList.add('selected', 'start-date');
                    } else if (dateStr === endStr) {
                        dayElement.classList.add('selected', 'end-date');
                    } else if (date >= selectedStartDate && date <= selectedEndDate) {
                        dayElement.classList.add('in-range');
                    }
                } else if (selectedStartDate && formatDate(selectedStartDate) === dateStr) {
                    dayElement.classList.add('selected', 'start-date');
                }

                grid.appendChild(dayElement);
            }
        }

        function selectDate(date) {
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            
            // No permitir seleccionar fechas pasadas
            if (date < today) {
                return;
            }
            
            if (!selectedStartDate || (selectedStartDate && selectedEndDate)) {
                // Primera selección o resetear selección
                selectedStartDate = date;
                selectedEndDate = null;
                document.getElementById('startDate').value = formatDateInput(date);
                document.getElementById('endDate').value = '';
            } else if (date > selectedStartDate) {
                // Segunda selección (fecha final)
                selectedEndDate = date;
                document.getElementById('endDate').value = formatDateInput(date);
            } else if (date < selectedStartDate) {
                // Si selecciona una fecha anterior a la inicial, hacerla la nueva inicial
                selectedStartDate = date;
                selectedEndDate = null;
                document.getElementById('startDate').value = formatDateInput(date);
                document.getElementById('endDate').value = '';
            } else {
                // Si hace clic en la misma fecha, resetear
                selectedStartDate = null;
                selectedEndDate = null;
                document.getElementById('startDate').value = '';
                document.getElementById('endDate').value = '';
            }
            
            generateCalendar();
            calculateTotal();
            updateContinueButton();
        }

        function changeMonth(direction) {
            currentDate.setMonth(currentDate.getMonth() + direction);
            generateCalendar();
        }

        function formatDateInput(date) {
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        function formatDate(date) {
            return formatDateInput(date);
        }
        
        function updateCalendarFromInputs() {
            const startDateValue = document.getElementById('startDate').value;
            const endDateValue = document.getElementById('endDate').value;
            
            if (startDateValue) {
                selectedStartDate = new Date(startDateValue);
            } else {
                selectedStartDate = null;
            }
            
            if (endDateValue) {
                selectedEndDate = new Date(endDateValue);
            } else {
                selectedEndDate = null;
            }
            
            generateCalendar();
            calculateTotal();
            updateContinueButton();
        }
        
        function updateContinueButton() {
            const startDate = document.getElementById('startDate').value;
            const endDate = document.getElementById('endDate').value;
            const continueBtn = document.getElementById('continueToPaymentBtn');
            
            if (startDate && endDate && new Date(endDate) > new Date(startDate)) {
                continueBtn.disabled = false;
                continueBtn.style.opacity = '1';
                continueBtn.style.cursor = 'pointer';
            } else {
                continueBtn.disabled = true;
                continueBtn.style.opacity = '0.5';
                continueBtn.style.cursor = 'not-allowed';
            }
        }

        function calculateTotal() {
            const startDateValue = document.getElementById('startDate').value;
            const endDateValue = document.getElementById('endDate').value;
            
            if (startDateValue && endDateValue) {
                const startDate = new Date(startDateValue);
                const endDate = new Date(endDateValue);
                
                if (endDate > startDate) {
                    const diffTime = Math.abs(endDate - startDate);
                    const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                    const total = diffDays * pricePerDay;
                    
                    document.getElementById('summaryDays').textContent = diffDays;
                    document.getElementById('summaryTotal').textContent = `€${total.toFixed(2)}`;
                    document.getElementById('totalAmount').textContent = `€${total.toFixed(2)}`;
                } else {
                    document.getElementById('summaryDays').textContent = '0';
                    document.getElementById('summaryTotal').textContent = '€0.00';
                    document.getElementById('totalAmount').textContent = '€0.00';
                }
            } else {
                document.getElementById('summaryDays').textContent = '0';
                document.getElementById('summaryTotal').textContent = '€0.00';
                document.getElementById('totalAmount').textContent = '€0.00';
            }
            
            updateContinueButton();
        }

        // Escuchar cambios en las fechas para calcular total
        document.getElementById('startDate').addEventListener('change', function() {
            updateCalendarFromInputs();
        });
        document.getElementById('endDate').addEventListener('change', function() {
            updateCalendarFromInputs();
        });

        async function submitReservation() {
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Processing...';

            // Recopilar datos del formulario
            const formData = {
                fullName: document.getElementById('fullName').value,
                passport: document.getElementById('passport').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                address: document.getElementById('address').value,
                city: document.getElementById('city').value,
                postalCode: document.getElementById('postalCode').value,
                country: document.getElementById('country').value,
                startDate: document.getElementById('startDate').value,
                endDate: document.getElementById('endDate').value,
                pickupLocation: document.getElementById('pickupLocation').value,
            };

            // Calcular días y total
            const startDate = new Date(formData.startDate);
            const endDate = new Date(formData.endDate);
            const diffTime = Math.abs(endDate - startDate);
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            const total = diffDays * pricePerDay;
            const totalCents = Math.round(total * 100);

            try {
                // Preparar datos para la API
                const reservationData = {
                    amount: totalCents,
                    currency: 'eur',
                    customerData: {
                        name: formData.fullName,
                        email: formData.email,
                        phone: formData.phone,
                        dni: formData.passport,
                        address: formData.address,
                        city: formData.city,
                        postalCode: formData.postalCode,
                        country: formData.country,
                    },
                    reservationData: {
                        car: selectedCar,
                        pricePerDay: pricePerDay,
                        days: diffDays,
                        startDate: formData.startDate.split('T')[0],
                        endDate: formData.endDate.split('T')[0],
                        pickupLocation: formData.pickupLocation,
                    }
                };

                // Obtener URL del backend (usar relativa o configurar)
                const BACKEND_URL = window.BACKEND_URL || 'http://localhost:3000';

                const response = await fetch(`${BACKEND_URL}/api/reserve`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(reservationData),
                });

                const data = await response.json();

                if (response.ok && data.clientSecret) {
                    showMessage('Reservation created successfully! Redirecting to payment...', 'success');
                    
                    // Aquí podrías redirigir a Stripe Checkout o procesar el pago
                    // Por ahora, mostramos un mensaje de éxito
                    setTimeout(() => {
                        alert(`Reservation confirmed!\n\nVehicle: ${selectedCar}\nDays: ${diffDays}\nTotal: €${total.toFixed(2)}\n\nYou will receive a confirmation email.`);
                        // Redirigir a la página principal
                        window.location.href = '../index.html';
                    }, 2000);
                } else {
                    throw new Error(data.error || 'Error processing reservation');
                }
            } catch (error) {
                console.error('Error:', error);
                showMessage('Error processing reservation: ' + error.message, 'error');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Confirm & Pay';
            }
        }

        function showMessage(message, type) {
            const statusDiv = document.getElementById('paymentStatus');
            statusDiv.textContent = message;
            statusDiv.className = type === 'error' ? 'error-message' : 'success-message';
            statusDiv.style.display = 'block';
        }
    </script>
</body>
</html>
